# -------- Military Conference Call Gateway – runtime config --------
realm: mccg.mil
audit_log: ./audit.jsonl        # change to /var/log/mccg/audit.jsonl in prod

bind:
  sip_udp:       0.0.0.0:5060
  sip_tls:       0.0.0.0:5061
  rtp_range:     [16384, 32767]
  webrtc_https:  0.0.0.0:8443
  web_console:   0.0.0.0:8080   # ← REST API + SPA
  metrics:       0.0.0.0:9100

tls:
  cert: /etc/mccg/tls/server.crt
  key:  /etc/mccg/tls/server.key
  ca:   /etc/mccg/tls/ca.crt
  require_client_cert: false

media:
  preferred_codecs: [opus, PCMU, PCMA, G729]
  ptime_ms:               20
  jitter_target_ms:       60
  mix_sample_rate:        16000
  max_talkers_per_group:  3
